<!DOCTYPE html>
<html dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>الاستماع</title>

<style>

body{
margin:0;
font-family:Arial;
background:white;
}

h2{
text-align:center;
}

#surahs{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:10px;
padding:10px;
}

.surah{
border:1px solid #ccc;
padding:15px 5px;
text-align:center;
border-radius:10px;
cursor:pointer;
}

.selected{
background:#2f3a56;
color:white;
}

#playBtn{
width:95%;
margin:15px auto;
display:block;
padding:15px;
font-size:18px;
}

audio{
width:95%;
display:block;
margin:auto;
}

</style>
</head>

<body>

<h2>🎧 الاستماع - العفاسي</h2>

<div id="surahs">

<div class="surah" onclick="selectSurah(this,'001.mp3')">الفاتحة</div>
<div class="surah" onclick="selectSurah(this,'002.mp3')">البقرة</div>
<div class="surah" onclick="selectSurah(this,'003.mp3')">آل عمران</div>
<div class="surah" onclick="selectSurah(this,'004.mp3')">النساء</div>

<div class="surah" onclick="selectSurah(this,'005.mp3')">المائدة</div>
<div class="surah" onclick="selectSurah(this,'006.mp3')">الأنعام</div>
<div class="surah" onclick="selectSurah(this,'007.mp3')">الأعراف</div>
<div class="surah" onclick="selectSurah(this,'008.mp3')">الأنفال</div>

</div>

<button id="playBtn" onclick="startReading()">
▶ بدء القراءة
</button>

<audio id="player" controls></audio>

<script>

let selectedFile="";

function selectSurah(box,file){

document.querySelectorAll(".surah")
.forEach(x=>x.classList.remove("selected"));

box.classList.add("selected");

selectedFile=file;

}

function startReading(){

if(selectedFile==""){
alert("اختر سورة");
return;
}

document.getElementById("player").src=selectedFile;

document.getElementById("player").play();

}

</script>

</body>
</html>
