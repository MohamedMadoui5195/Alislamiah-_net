<!DOCTYPE html>
<html dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>المصحف الشريف</title>

<style>
body { margin:0; overflow:hidden; }

.page {
  position:absolute;
  top:0;
  width:100%;
  height:100%;
  transition:transform 0.3s ease;
}

/* ترتيب الصفحات */
#page1 { background:#fff; }
#page2 { background:#f2f2f2; left:100%; }
#page3 { background:#eaeaea; left:200%; }
</style>
</head>

<body>

<!-- زر القائمة -->
<button id="menuBtn" style="
position:fixed;
top:10px;
right:10px;
z-index:10000;
padding:10px;
background:rgba(0,0,0,.5);
color:#fff;
border:none;
border-radius:10px;
">☰</button>

<!-- الصفحات -->
<div id="container">

<div class="page" id="page1">
<img src="Screenshot_20260618-213953.jpg" style="width:100%;display:block;">
</div>

<div class="page" id="page2">
<img src="Screenshot_20260618-213957.jpg" style="width:100%;display:block;">
</div>

<div class="page" id="page3">
<h2 style="text-align:center;">صفحة ثالثة</h2>
</div>

</div>

<script>
let index = 0;
const pages = document.querySelectorAll(".page");

function update() {
  pages.forEach((p,i)=>{
    p.style.transform = `translateX(${(i - index) * 100}%)`;
  });
}
update();

/* السحب */
let startX = 0;

document.addEventListener("touchstart", e=>{
  startX = e.touches[0].clientX;
});

document.addEventListener("touchend", e=>{
  let endX = e.changedTouches[0].clientX;

  if(startX - endX > 50) {
    if(index < pages.length - 1) index++;
  }

  if(endX - startX > 50) {
    if(index > 0) index--;
  }

  update();
});
</script>

</body>
</html>
